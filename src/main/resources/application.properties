spring.application.name=apirestful

# logging.level.org.hibernate.orm.connections.pooling=WARN

spring.datasource.url=jdbc:mysql://localhost:3306/desweb
spring.datasource.username=root
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false

# HikariCP Configuracoes

# spring.datasource.hikari.minimum-idle=1
# spring.datasource.hikari.maximum-pool-size=10
# spring.datasource.hikari.auto-commit=true
# spring.datasource.hikari.transaction-isolation=2

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate
# O schema agora eh gerenciado pelo Flyway (db/migration/V*.sql).
# ddl-auto=validate: Hibernate apenas confere que as tabelas batem com as entidades.

# Flyway: so continua se o historico de migracoes estiver sincronizado.
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.config.import=optional:file:.env[.properties]

# Chave criada no site: https://generate-random.org/
# CHAVE-SECRETA: nome da variavel de ambiente definida no arquivo .env na raiz do projeto
api.security.token.secret=${CHAVE_SECRETA}

# Para que a chave secreta seja encontrada em uma variavel de ambiente:
# 1. Adicionar uma dependencia no pom.xml (ja adicionada)
# 2. Incluir no projeto o arquivo .env contendo o nome da variavel de ambiente e o seu valor
# 3. Adicionar o arquivo .env em .gitignore (nao fiz isso para o arquivo nao desapareça
#    do projeto ao ser copiado para o github)

# Tempo de expiracao do token em segundos - 2 horas = 7200 segundos = 2 horas x 60 min * 60 segs
jwt.security.accessTokenExpiration=7200

# RabbitMQ
# Defaults para rodar o backend localmente (spring-boot:run). No docker-compose
# o backend sobrescreve via variaveis de ambiente (SPRING_RABBITMQ_HOST=...).
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest

# Em publicadores/consumidores do app, novo listener que falhe faz o startup
# falhar. Mantemos a default (true) — se o RabbitMQ nao estiver no ar, voce
# saber logo no boot.
